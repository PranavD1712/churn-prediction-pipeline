name: Churn Prediction CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tensorflow scikit-learn pandas numpy fastapi uvicorn pydantic prometheus-client pytest httpx mlflow

    - name: Generate training data
      run: python src/ingestion/data_simulator.py

    - name: Train model
      run: python src/training/train_model.py

    - name: Run tests
      run: pytest tests/ -v --tb=short

    - name: Test API startup
      run: |
        uvicorn src.serving.app:app --host 0.0.0.0 --port 8000 &
        sleep 5
        curl -f http://localhost:8000/health
        kill %1